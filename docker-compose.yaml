version: "3.8"

services:
  # O servidor de aplicação (PHP)
  app:
    build:
      context: .
      dockerfile: ./docker/php.dockerfile
    image: laravel-api-app
    container_name: laravel-app
    restart: unless-stopped
    working_dir: /var/www
    user: "1000:1000"
    volumes:
      - ./:/var/www
    networks:
      - app-network

  # O servidor Web (Nginx)
  web:
    image: nginx:alpine
    container_name: nginx-server
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app

  # O Banco de Dados (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: systock_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    networks:
      - app-network

  pgAdmin:
    container_name: pgadmin-container
    image: dpage/pgadmin4:8.9
    ports:
      - 15432:80
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
